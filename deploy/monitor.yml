---
- name: Deploy Iristrace Monitor Dashboard
  hosts: "{{ swarm }}"
  become: true

  vars:
    app_dir: /opt/iristrace-dashboard
    image: "hub.iristrace.com/iristrace/monitor:{{ ci_pipeline_id }}"

  tasks:
    - name: Crear directorio de la aplicación
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copiar docker-compose.prod.yml
      copy:
        src: ../docker-compose.prod.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Copiar .env
      copy:
        src: ../.env
        dest: "{{ app_dir }}/.env"
        mode: "0644"

    - name: Copiar ficheros de datos
      copy:
        src: "{{ item }}"
        dest: "{{ app_dir }}/"
        mode: "0644"
      loop:
        - ../apis
        - ../nifis
        - ../logo.png

    - name: Login al registry
      command: >
        docker login hub.iristrace.com
        -u {{ hub_user }}
        -p {{ hub_password }}
      no_log: true

    - name: Pull de la imagen
      command: docker pull {{ image }}

    - name: Parar contenedor anterior
      command: docker compose down
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: true

    - name: Actualizar imagen en docker-compose
      replace:
        path: "{{ app_dir }}/docker-compose.yml"
        regexp: 'hub\.iristrace\.com/iristrace/monitor:latest'
        replace: "{{ image }}"

    - name: Arrancar contenedor
      command: docker compose up -d
      args:
        chdir: "{{ app_dir }}"
