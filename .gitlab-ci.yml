stages:
  - build
  - deploy

variables:
  # Imagen corregida para tu repositorio de monitor
  DOCKER_IMAGE: hub.iristrace.com/iristrace/monitor:$CI_PIPELINE_ID
  DOCKER_IMAGE_LATEST: hub.iristrace.com/iristrace/monitor:latest
  DEPLOYMENT_TOOLS_IMAGE: iristrace/deployment-tools:20440

# ── Build ─────────────────────────────────────────────────────────────────────

create-docker-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u $HUB_USER -p $HUB_PASSWORD hub.iristrace.com
  script:
    # Build basado en tu Dockerfile 
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main
    - tags

# ── Deploy ────────────────────────────────────────────────────────────────────

.deployment_script: &deployment-script
  image: hub.iristrace.com/$DEPLOYMENT_TOOLS_IMAGE
  needs:
    - job: create-docker-image
  before_script:
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - ssh-keyscan gitlab.iristrace.com >> ~/.ssh/known_hosts
    - echo "$ANSIBLE_VAULT_PASSWORD" | tr -d '\r' > ~/.vault-password
    - chmod 644 ~/.ssh/known_hosts
  script:
    - cd ./deploy
    - ansible-playbook --vault-password-file=~/.vault-password
        --extra-vars="swarm=$SWARM ci_pipeline_id=$CI_PIPELINE_ID hub_user=$HUB_USER hub_password=$HUB_PASSWORD"
        monitor.yml --limit $SWARM

.deploy: &deploy
  stage: deploy
  <<: *deployment-script
  only:
    - main
    - tags

# Ejemplo de despliegue en un nodo de gestión (ajusta el SWARM según necesites)
monitor-to-swarm010:
  <<: *deploy
  variables:
    SWARM: "swarm010"
  when: manual

monitor-to-swarm-g033:
  <<: *deploy
  variables:
    SWARM: "swarm-g033"
  when: manual
